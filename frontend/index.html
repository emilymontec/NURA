<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#06080d">
    <title>NURA | Inteligencia conversacional para analisis empresarial</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    
    <div id="app"></div>

    <script src="scripts/main.js"></script>
    <script>
        async function loadView(viewName) {
            try {
                const response = await fetch(`views/${viewName}.html`);
                if (response.ok) {
                    document.getElementById('app').innerHTML = await response.text();
                    initializeDashboard();
                } else {
                    document.getElementById('app').innerHTML = `<h2 style="color:red; text-align:center;">Error cargando vista</h2>`;
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        loadView('chat');
    </script>
</body>
</html>
